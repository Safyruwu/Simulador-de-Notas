<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala de Notas</title>
  <link rel="stylesheet" href="theme.css?v=6" />
  <link rel="stylesheet" href="animations.css" />
  <link rel="stylesheet" href="toasts.css?v=2" />
  <link rel="stylesheet" href="escala.css?v=3" />
</head>
<body>
  <main class="container">
    <a href="index.html" class="back-link">Inicio</a>
    <h1>Escala de Notas</h1>
    <p class="subtitle">Generá una tabla de conversión entre puntaje y nota.</p>

    <section class="card">
      <h2>Parámetros</h2>

      <div class="params-grid">
        <label>
          <span>Puntaje máximo</span>
          <input type="number" id="puntaje-max" step="any" min="1" placeholder="100" />
        </label>
        <label>
          <span>Porcentaje de exigencia (%)</span>
          <input type="number" id="exigencia" step="any" min="0" max="100" placeholder="60" />
        </label>
        <label>
          <span>Nota mínima</span>
          <input type="number" id="nota-min" step="any" placeholder="1.0" />
        </label>
        <label>
          <span>Nota máxima</span>
          <input type="number" id="nota-max" step="any" placeholder="7.0" />
        </label>
        <label>
          <span>Nota de aprobación</span>
          <input type="number" id="nota-aprob" step="any" placeholder="4.0" />
        </label>
      </div>

      <div class="param-actions">
        <button id="calcular-btn" type="button" class="btn btn-primary">Calcular</button>
        <button id="ordenar-asc" type="button" class="btn btn-secondary">Orden ascendente</button>
        <button id="ordenar-desc" type="button" class="btn btn-secondary">Orden descendente</button>
        <button id="exportar-btn" type="button" class="btn btn-secondary">Exportar a Excel</button>
        <button id="reset-btn" type="button" class="btn btn-ghost">Reiniciar valores</button>
      </div>

      <div id="param-warning" class="warning"></div>
    </section>

    <section class="card" id="resultado-card" hidden aria-live="polite">
      <h2>Tabla de conversión</h2>
      <div class="tabla-wrapper"></div>
      <p class="hint" id="resumen"></p>
    </section>
  </main>

  <script src="ui.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="escala.js?v=8"></script>
  <script src="footer.js?v=2"></script>
</body>
</html>
